# LiteLLM Proxy Configuration
# https://docs.litellm.ai/docs/proxy/configs

model_list:
  # OpenAI Models (vision-capable default first)
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # Anthropic Models
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  # Google Models
  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_AI_API_KEY

  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/GOOGLE_AI_API_KEY

  # Fallback model
  - model_name: default
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # ─── AI Agent Model Group ───────────────────────────────────
  # Priority: gpt-4o-mini (cheapest) → gpt-4o → claude-sonnet → gemini-flash → gemini-pro
  # LiteLLM routes to the first healthy model in the group automatically
  - model_name: ai-agent
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: ai-agent
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: ai-agent
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: ai-agent
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_AI_API_KEY

  - model_name: ai-agent
    litellm_params:
      model: gemini/gemini-2.0-flash-lite
      api_key: os.environ/GOOGLE_AI_API_KEY

litellm_settings:
  drop_params: true
  set_verbose: false
  num_retries: 3
  request_timeout: 60
  telemetry: false
  # Allow fallback across models in the same group
  fallbacks:
    - gpt-4o: ["gpt-4o-mini", "claude-sonnet", "gemini-pro", "gemini-flash"]
    - gpt-4o-mini: ["gpt-4o", "claude-sonnet", "gemini-pro", "gemini-flash"]
    - ai-agent: ["gpt-4o-mini", "gpt-4o", "claude-sonnet", "gemini-pro", "gemini-flash"]

general_settings:
  master_key: sk-Aj5GPZa05hyTCTlvmfAYzw
  database_url: os.environ/DATABASE_URL
