# LiveKit Server Configuration
# https://docs.livekit.io/realtime/self-hosting/configuration/

port: 7880
rtc:
  tcp_port: 7881
  udp_port: 7882
  use_external_ip: false
  enable_loopback_candidate: true

keys:
  devkey: secret_dev_key_change_in_production

logging:
  level: info

room:
  auto_create: true
  empty_timeout: 300         # 5 minutes
  max_participants: 50

# Recording (requires Egress service for production)
# webhook:
#   urls:
