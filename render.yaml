services:
  - type: web
    name: saleassist-api
    env: node
    buildCommand: pnpm install && pnpm turbo build --filter=@saleassist/api...
    startCommand: pnpm --filter @saleassist/database db:push && pnpm --filter @saleassist/database db:seed && node apps/api/dist/main.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
